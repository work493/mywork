<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Köşe Kafe — Sipariş</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <span class="header-logo">Köşe Kafe</span>
    <span class="header-masa" id="masa-label">Masa yükleniyor...</span>
  </div>
  <button class="cart-btn" onclick="toggleCart()">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
    </svg>
    Sepet
    <span class="cart-count" id="cart-count">0</span>
  </button>
</header>

<!-- KATEGORİ SEKMELERİ -->
<div class="cat-tabs" id="cat-tabs"></div>

<!-- MENÜ -->
<div id="menu-container"></div>

<!-- SEPET OVERLAY -->
<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

<!-- SEPET DRAWER -->
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-handle"></div>
  <div class="cart-header">
    <span class="cart-title">Sepetim</span>
    <button class="cart-close" onclick="toggleCart()">×</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer" id="cart-footer" style="display:none">
    <div class="cart-total">
      <span>Toplam</span>
      <span class="cart-total-price" id="cart-total">0 ₺</span>
    </div>
    <textarea class="note-area" id="order-note"
      placeholder="Not ekle (şekersiz, az buz, vs.)" rows="2"></textarea>
    <button class="whatsapp-btn" onclick="sendWhatsApp()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Sipariş Ver
    </button>
  </div>
</div>

<!-- BAŞARI EKRANI -->
<div class="success-screen" id="success-screen">
  <div class="success-icon">✓</div>
  <h2 class="success-title">Siparişin alındı!</h2>
  <p class="success-sub">WhatsApp üzerinden siparişin iletildi. Kısa sürede hazırlanacak.</p>
  <button class="success-back" onclick="resetOrder()">Yeni Sipariş Ver</button>
</div>

<script src="script.js"></script>
</body>
</html>
