*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {

  --sans: 'Inter', system-ui, sans-serif;

html, body { height: 100%; }
body { font-family: var(--sans); background: var(--cream); color: var(--dark); font-size: 15px; line-height: 1.6; padding-bottom: 120px; padding-top: 112px; }
header { background: var(--dark); color: white; padding: 1.1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; position: fixed; top: 0; left: 0; right: 0; z-index: 50; }
.header-left { display: flex; flex-direction: column; }
.header-logo { font-family: var(--serif); font-size: 1.3rem; color: white; font-weight: 400; letter-spacing: 0.04em; }
.header-masa { font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--amber); margin-top: 0.1rem; }
.cart-btn { background: var(--amber); border: none; border-radius: 2px; padding: 0.6rem 1.1rem; color: white; font-size: 0.8rem; font-weight: 600; font-family: var(--sans); cursor: pointer; display: flex; align-items: center; gap: 0.5rem; transition: background 0.2s; }
.cart-btn:hover { background: #a93226; }
.cart-count { background: white; color: var(--amber); border-radius: 50%; width: 20px; height: 20px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; font-weight: 700; }
.cat-tabs { display: flex; overflow-x: auto; background: white; border-bottom: 1px solid var(--border); padding: 0 0.5rem; scrollbar-width: none; position: fixed; top: 68px; left: 0; right: 0; z-index: 40; }
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab { flex-shrink: 0; padding: 0.9rem 1.1rem; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); border: none; background: none; font-family: var(--sans); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; white-space: nowrap; }
.cat-tab.active { color: var(--brown); border-bottom-color: var(--amber); }
.menu-section { padding: 1.25rem; }
.menu-section-title { font-family: var(--serif); font-size: 1.2rem; font-weight: 400; color: var(--brown); margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); font-style: italic; }
.menu-items { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1.5rem; }
.menu-item { background: white; border-radius: 4px; border: 1px solid var(--border); padding: 0.85rem 1rem; display: flex; align-items: center; gap: 0.75rem; transition: border-color 0.15s; }
.menu-item.in-cart { border-color: var(--amber); }
.menu-item-info { flex: 1; min-width: 0; }
.menu-item-name { font-weight: 500; font-size: 0.9rem; color: var(--dark); }
.single-ctrl { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
.menu-item-price { font-size: 0.85rem; font-weight: 600; color: var(--brown); white-space: nowrap; }
.item-controls { display: flex; align-items: center; gap: 0.3rem; }
.qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--cream); color: var(--dark); font-size: 0.95rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; line-height: 1; flex-shrink: 0; }
.qty-btn.add { background: var(--brown); color: white; border-color: var(--brown); }
.qty-display { font-size: 0.85rem; font-weight: 600; min-width: 16px; text-align: center; color: var(--dark); }
.size-group { display: flex; flex-direction: column; gap: 0.25rem; flex-shrink: 0; }
.size-row { display: flex; align-items: center; gap: 0.35rem; justify-content: flex-end; }
.size-lbl { font-size: 0.68rem; color: var(--muted); min-width: 38px; text-align: right; }
.size-pr { font-size: 0.78rem; font-weight: 600; color: var(--brown); min-width: 46px; text-align: right; white-space: nowrap; }
.size-ctrl { display: flex; align-items: center; gap: 0.25rem; }
.qty-btn.sm { width: 24px; height: 24px; font-size: 0.85rem; }
.qty-sm { font-size: 0.82rem; font-weight: 600; min-width: 14px; text-align: center; color: var(--dark); }
.cart-overlay { display: none; position: fixed; inset: 0; background: rgba(26,10,10,0.5); z-index: 80; }
.cart-overlay.open { display: block; }
.cart-drawer { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-radius: 16px 16px 0 0; z-index: 90; max-height: 85vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.3s ease; }
.cart-drawer.open { transform: translateY(0); }
.cart-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 1rem auto 0; }
.cart-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.cart-title { font-family: var(--serif); font-size: 1.2rem; font-weight: 400; color: var(--dark); }
.cart-close { border: none; background: none; font-size: 1.5rem; cursor: pointer; color: var(--muted); line-height: 1; padding: 0.2rem; }
.cart-items { padding: 1rem 1.5rem; }
.cart-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid var(--border); gap: 1rem; }
.cart-item:last-child { border-bottom: none; }
.cart-item-name { font-size: 0.9rem; font-weight: 500; }
.cart-item-qty { font-size: 0.8rem; color: var(--muted); }
.cart-item-price { font-size: 0.9rem; font-weight: 600; color: var(--brown); }
.cart-item-remove { border: none; background: none; color: var(--muted); font-size: 1rem; cursor: pointer; padding: 0.2rem 0.4rem; }
.cart-empty { text-align: center; padding: 3rem 1.5rem; color: var(--muted); font-size: 0.9rem; }
.cart-empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
.cart-footer { padding: 1rem 1.5rem 1.5rem; border-top: 1px solid var(--border); background: white; position: sticky; bottom: 0; }
.cart-total { display: flex; justify-content: space-between; margin-bottom: 1rem; font-weight: 600; font-size: 1rem; }
.cart-total-price { color: var(--brown); font-size: 1.1rem; }
.note-area { width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: 4px; font-family: var(--sans); font-size: 0.85rem; color: var(--dark); background: var(--cream); resize: none; margin-bottom: 1rem; outline: none; }
.note-area:focus { border-color: var(--amber); }
.siparis-btn { width: 100%; padding: 1rem; background: var(--brown); color: white; border: none; border-radius: 4px; font-family: var(--sans); font-size: 0.95rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 0.6rem; transition: background 0.2s; }
.siparis-btn:hover { background: var(--dark); }
.siparis-btn:disabled { background: #ccc; cursor: not-allowed; }
.success-screen { display: none; position: fixed; inset: 0; background: var(--cream); z-index: 100; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem; }
.success-screen.show { display: flex; }
.success-icon { width: 80px; height: 80px; background: var(--success); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 1.5rem; font-size: 2rem; color: white; }
.success-title { font-family: var(--serif); font-size: 2rem; color: var(--dark); margin-bottom: 0.75rem; font-style: italic; }
.success-sub { color: var(--muted); font-size: 0.95rem; max-width: 300px; }
.success-back { margin-top: 2rem; padding: 0.85rem 2rem; background: var(--brown); color: white; border: none; border-radius: 4px; font-family: var(--sans); font-size: 0.9rem; font-weight: 600; cursor: pointer; }

/* Boyut seçim modalı */
.size-modal { display: none; position: fixed; inset: 0; z-index: 200; }
.size-modal.open { display: block; }
.size-modal-overlay { position: absolute; inset: 0; background: rgba(26,10,10,0.6); }
.size-modal-sheet {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: white; border-radius: 20px 20px 0 0;
  padding: 0 0 2rem;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 1rem auto; }
.modal-urun-adi { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; font-style: italic; color: var(--dark); padding: 0 1.5rem 1rem; border-bottom: 1px solid var(--border); }
.modal-size-row { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); }
.modal-size-row:last-child { border-bottom: none; }
.modal-size-info { display: flex; flex-direction: column; }
.modal-size-name { font-size: 1rem; font-weight: 500; color: var(--dark); }
.modal-size-price { font-size: 0.9rem; color: var(--brown); font-weight: 600; margin-top: 0.1rem; }
.modal-size-ctrl { display: flex; align-items: center; gap: 0.5rem; }
.modal-kapat { display: block; margin: 1rem 1.5rem 0; width: calc(100% - 3rem); padding: 0.9rem; background: var(--brown); border: none; border-radius: 4px; font-family: var(--sans); font-size: 0.95rem; font-weight: 600; color: white; cursor: pointer; }

/* Boyutlu ürün menü görünümü */
.menu-item.sized { cursor: pointer; }
.menu-item.sized:active { background: #fdf5f5; }
.sized-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
.start-pr { font-size: 0.85rem; font-weight: 600; color: var(--brown); white-space: nowrap; }
.arrow-icon { font-size: 1.2rem; color: var(--muted); }
.cart-badge { display: inline-block; background: var(--amber); color: white; font-size: 0.65rem; font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 10px; margin-top: 0.25rem; }

</style>

    { id:73, ad:"Muz Frappe",        boyutlar:[{ad:"Büyük",fiyat:200},{ad:"Küçük",fiyat:180}] },
    { id:74, ad:"Çilek Frappe",      boyutlar:[{ad:"Büyük",fiyat:200},{ad:"Küçük",fiyat:180}] },
    { id:75, ad:"Vanilya Frappe",    boyutlar:[{ad:"Büyük",fiyat:200},{ad:"Küçük",fiyat:180}] },
    { id:76, ad:"Çikolatali Frappe", boyutlar:[{ad:"Büyük",fiyat:200},{ad:"Küçük",fiyat:180}] },
    { id:77, ad:"Frappuccino",       boyutlar:[{ad:"Büyük",fiyat:200},{ad:"Küçük",fiyat:180}] },
  ]},
  { kategori: "★ Dondurma", urunler: [
    { id:78, ad:"Dondurma Topu",        fiyat:60  },
    { id:79, ad:"Dondurma Cup (4 Top)", fiyat:220 },
  ]},
];

let sepet = {};
let masaNo = 1;

function getMasaNo() {
  const p = new URLSearchParams(window.location.search);
  const m = parseInt(p.get("masa"));
  return (m && m >= 1 && m <= 10) ? m : 1;
}

function findUrun(id) {
  for (const k of menu) { const u = k.urunler.find(u => u.id === id); if (u) return u; }
  return null;
}

function getKey(id, boyut) { return boyut ? `${id}_${boyut}` : `${id}`; }

function updateCartCount() {
  const total = Object.values(sepet).reduce((a, b) => a + b.adet, 0);
  document.getElementById("cart-count").textContent = total;
}

function renderItemControls(urun) {
  if (urun.boyutlar) {
    const minFiyat = Math.min(...urun.boyutlar.map(b => b.fiyat));
    const totalQty = urun.boyutlar.reduce((s, b) => s + (sepet[getKey(urun.id, b.ad)] ? sepet[getKey(urun.id, b.ad)].adet : 0), 0);
    return `<div class="sized-right" onclick="window.openSizeModal(${urun.id})">
      ${totalQty > 0 ? `<span class="cart-badge">${totalQty} adet</span>` : ''}
      <span class="start-pr">${minFiyat} ₺'den</span>
      <span class="arrow-icon">›</span>
    </div>`;
  } else {
    const key = getKey(urun.id, null);
    const qty = sepet[key] ? sepet[key].adet : 0;
    return `<div class="single-ctrl">
      <span class="menu-item-price">${urun.fiyat} ₺</span>
      <div class="item-controls">
        ${qty > 0 ? `<button class="qty-btn" onclick="window.change(${urun.id},null,-1)">−</button><span class="qty-display">${qty}</span>` : ''}
        <button class="qty-btn add" onclick="window.change(${urun.id},null,1)">+</button>
      </div>
    </div>`;
  }
}

function updateItem(id) {
  const el = document.getElementById("item-"+id);
  if (!el) return;
  const urun = findUrun(id);
  if (!urun) return;
  const hasItems = urun.boyutlar
    ? urun.boyutlar.some(b => sepet[getKey(urun.id, b.ad)])
    : sepet[getKey(urun.id, null)];
  el.className = "menu-item" + (urun.boyutlar ? " sized" : "") + (hasItems ? " in-cart" : "");
  el.innerHTML = `<div class="menu-item-info"><div class="menu-item-name">${urun.ad}</div></div>${renderItemControls(urun)}`;
}

function renderMenu() {
  const container = document.getElementById("menu-container");
  const tabs = document.getElementById("cat-tabs");
  container.innerHTML = ""; tabs.innerHTML = "";
  menu.forEach((kat, ki) => {
    const tab = document.createElement("button");
    tab.className = "cat-tab" + (ki === 0 ? " active" : "");
    tab.textContent = kat.kategori;
    tab.onclick = () => {
      document.querySelectorAll(".cat-tab").forEach(t => t.classList.remove("active"));
      tab.classList.add("active");
      document.getElementById("sec-"+ki).scrollIntoView({behavior:"smooth",block:"start"});
    };
    tabs.appendChild(tab);
    const sec = document.createElement("div");
    sec.className = "menu-section"; sec.id = "sec-"+ki;
    const title = document.createElement("div");
    title.className = "menu-section-title"; title.textContent = kat.kategori;
    sec.appendChild(title);
    const items = document.createElement("div"); items.className = "menu-items";
    kat.urunler.forEach(urun => {
      const el = document.createElement("div");
      el.className = "menu-item" + (urun.boyutlar ? " sized" : "");
      el.id = "item-"+urun.id;
      el.innerHTML = `<div class="menu-item-info"><div class="menu-item-name">${urun.ad}</div></div>${renderItemControls(urun)}`;
      items.appendChild(el);
    });
    sec.appendChild(items); container.appendChild(sec);
  });
}

window.change = (id, boyut, delta) => {
  const key = getKey(id, boyut);
  const urun = findUrun(id);
  if (!urun) return;
  if (!sepet[key] && delta > 0) {
    const fiyat = boyut ? urun.boyutlar.find(b => b.ad === boyut).fiyat : urun.fiyat;
    sepet[key] = { ad: boyut ? `${urun.ad} (${boyut})` : urun.ad, fiyat, adet: 0 };
  }
  if (sepet[key]) {
    sepet[key].adet = Math.max(0, sepet[key].adet + delta);
    if (sepet[key].adet === 0) delete sepet[key];
  }
  updateItem(id);
  updateCartCount();
};

window.toggleCart = () => {
  const overlay = document.getElementById("cart-overlay");
  const drawer = document.getElementById("cart-drawer");
  const open = drawer.classList.contains("open");
  if (open) { drawer.classList.remove("open"); overlay.classList.remove("open"); }
  else { renderCart(); drawer.classList.add("open"); overlay.classList.add("open"); }
};

function renderCart() {
  const container = document.getElementById("cart-items");
  const footer = document.getElementById("cart-footer");
  const keys = Object.keys(sepet);
  if (keys.length === 0) {
    container.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">☕</div>Sepetiniz boş.<br>Menüden ürün ekleyin.</div>`;
    footer.style.display = "none"; return;
  }
  let total = 0; container.innerHTML = "";
  keys.forEach(key => {
    const item = sepet[key];
    const sub = item.fiyat * item.adet; total += sub;
    const el = document.createElement("div"); el.className = "cart-item";
    el.innerHTML = `<div style="flex:1"><div class="cart-item-name">${item.ad}</div><div class="cart-item-qty">${item.adet} adet × ${item.fiyat} ₺</div></div><span class="cart-item-price">${sub} ₺</span><button class="cart-item-remove" onclick="window.removeFromCart('${key}')">×</button>`;
    container.appendChild(el);
  });
  document.getElementById("cart-total").textContent = total + " ₺";
  footer.style.display = "block";
}

window.removeFromCart = (key) => {
  const id = parseInt(key.split('_')[0]);
  delete sepet[key];
  updateItem(id);
  updateCartCount();
  renderCart();
};

let currentModalId = null;
let tempSepet = {}; // Modal için geçici sepet

function renderModalItems(id) {
  const urun = findUrun(id);
  if (!urun) return;
  const itemsEl = document.getElementById("modal-items");
  itemsEl.innerHTML = urun.boyutlar.map(b => {
    const key = getKey(id, b.ad);
    const qty = tempSepet[key] ? tempSepet[key].adet : 0;
    return `<div class="modal-size-row">
      <div class="modal-size-info">
        <span class="modal-size-name">${b.ad}</span>
        <span class="modal-size-price">${b.fiyat} ₺</span>
      </div>
      <div class="modal-size-ctrl">
        ${qty > 0 ? `<button class="qty-btn" onclick="window.modalChange(${id},'${b.ad}',-1)">−</button><span class="qty-display">${qty}</span>` : ''}
        <button class="qty-btn add" onclick="window.modalChange(${id},'${b.ad}',1)">+</button>
      </div>
    </div>`;
  }).join('');
}

window.openSizeModal = (id) => {
  const urun = findUrun(id);
  if (!urun || !urun.boyutlar) return;
  currentModalId = id;

  // Mevcut sepet durumunu geçici kopyaya al
  tempSepet = {};
  urun.boyutlar.forEach(b => {
    const key = getKey(id, b.ad);
    if (sepet[key]) tempSepet[key] = { ...sepet[key] };
  });

  document.getElementById("modal-urun-adi").textContent = urun.ad;
  renderModalItems(id);
  document.getElementById("size-modal").classList.add("open");
};

window.closeSizeModal = () => {
  // Değişiklikleri iptal et
  document.getElementById("size-modal").classList.remove("open");
  currentModalId = null;
  tempSepet = {};
};

window.sepetiOnayla = () => {
  if (!currentModalId) return;
  const urun = findUrun(currentModalId);
  if (!urun) return;

  // tempSepet'i gerçek sepete uygula
  urun.boyutlar.forEach(b => {
    const key = getKey(currentModalId, b.ad);
    if (tempSepet[key] && tempSepet[key].adet > 0) {
      sepet[key] = { ...tempSepet[key] };
    } else {
      delete sepet[key];
    }
  });

  updateItem(currentModalId);
  updateCartCount();
  document.getElementById("size-modal").classList.remove("open");
  currentModalId = null;
  tempSepet = {};
};

window.modalChange = (id, boyut, delta) => {
  const key = getKey(id, boyut);
  const urun = findUrun(id);
  if (!urun) return;

  if (!tempSepet[key] && delta > 0) {
    const fiyat = urun.boyutlar.find(b => b.ad === boyut).fiyat;
    tempSepet[key] = { ad: `${urun.ad} (${boyut})`, fiyat, adet: 0 };
  }

  if (tempSepet[key]) {
    tempSepet[key].adet = Math.max(0, tempSepet[key].adet + delta);
    if (tempSepet[key].adet === 0) delete tempSepet[key];
  }

  renderModalItems(id);
};

window.siparisGonder = async () => {
  const keys = Object.keys(sepet); if (keys.length === 0) return;
  const btn = document.querySelector(".siparis-btn");
  btn.disabled = true; btn.textContent = "Gönderiliyor...";
  const not = document.getElementById("order-note").value.trim();
  let toplam = 0;
  const urunlerListesi = [];
  keys.forEach(key => {
    const item = sepet[key];
    const sub = item.fiyat * item.adet; toplam += sub;
    urunlerListesi.push({ ad: item.ad, adet: item.adet, fiyat: item.fiyat });
  });
  try {
    await push(ref(db, FIREBASE_PATH), { masa: masaNo, urunler: urunlerListesi, toplam, not: not||"", durum: "bekliyor", zaman: Date.now() });
    document.getElementById("cart-drawer").classList.remove("open");
    document.getElementById("cart-overlay").classList.remove("open");
    document.getElementById("success-screen").classList.add("show");
  } catch(e) {
    alert("Bağlantı hatası, tekrar deneyin.");
    btn.disabled = false; btn.textContent = "✓ Sipariş Ver";
  }
};

window.resetOrder = () => {
  sepet = {};
  document.getElementById("order-note").value = "";
  document.getElementById("success-screen").classList.remove("show");
  const btn = document.querySelector(".siparis-btn");
  if (btn) { btn.disabled = false; btn.textContent = "✓ Sipariş Ver"; }
  updateCartCount(); renderMenu();
};

masaNo = getMasaNo();
document.getElementById("masa-label").textContent = "Masa " + masaNo;
document.title = KAFE_ADI + " — Masa " + masaNo;
renderMenu();

// Header ve sekme yüksekliğini ayarla
const header = document.querySelector("header");
const tabs = document.getElementById("cat-tabs");
if (header && tabs) {
  tabs.style.top = header.offsetHeight + "px";
}

// Scroll spy — hangi bölümdeyse o sekmeyi aktif yap
window.addEventListener("scroll", () => {
  const sections = document.querySelectorAll(".menu-section");
  const tabBtns = document.querySelectorAll(".cat-tab");
  const offset = (header ? header.offsetHeight : 68) + (tabs ? tabs.offsetHeight : 44) + 10;
  let aktif = 0;
  sections.forEach((sec, i) => {
    if (sec.getBoundingClientRect().top <= offset) aktif = i;
  });
  tabBtns.forEach((btn, i) => {
    btn.classList.toggle("active", i === aktif);
  });
}, { passive: true });
</script>
